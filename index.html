<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>违规案例库 · 亲子生活二组</title>
  <style>
    :root {
      --red: #ff2442;
      --red-soft: #ff6b81;
      --red-bg: #fff0f2;
      --orange: #ff6b35;
      --orange-bg: #fff4f0;
      --gray-50: #fafafa;
      --gray-100: #f4f4f5;
      --gray-200: #e4e4e7;
      --gray-300: #d1d1d6;
      --gray-400: #a1a1aa;
      --gray-600: #52525b;
      --gray-800: #27272a;
      --gray-900: #18181b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(135deg, #ff2442 0%, #ff6b35 100%);
      padding: 32px 24px 24px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 30%;
      width: 160px; height: 160px;
      background: rgba(255,255,255,.05);
      border-radius: 50%;
    }
    .hero-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px; position: relative; z-index: 1;
    }
    .hero-icon {
      width: 44px; height: 44px; background: rgba(255,255,255,.2);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; backdrop-filter: blur(8px);
    }
    .hero-text h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .hero-text p { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }
    .hero-add-btn {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      background: rgba(255,255,255,.2);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.4);
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .hero-add-btn:hover { background: rgba(255,255,255,.3); }

    /* Stats chips */
    .hero-stats {
      display: flex; gap: 10px; position: relative; z-index: 1; flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px; color: rgba(255,255,255,.9);
      backdrop-filter: blur(4px);
    }
    .stat-chip strong { color: #fff; }

    /* ── Sticky toolbar ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 12px 20px;
      position: sticky; top: 0; z-index: 100;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 180px; position: relative;
    }
    .search-wrap input {
      width: 100%; padding: 8px 14px 8px 36px;
      background: var(--gray-100); border: 1.5px solid transparent;
      border-radius: var(--radius-sm); font-size: 13.5px;
      color: var(--gray-900); outline: none; transition: all .2s;
    }
    .search-wrap input:focus { background: #fff; border-color: var(--red); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); font-size: 14px; pointer-events: none;
    }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip-btn {
      padding: 6px 13px; border-radius: 20px;
      border: 1.5px solid var(--gray-200); background: #fff;
      font-size: 12.5px; color: var(--gray-600); cursor: pointer;
      transition: all .15s; white-space: nowrap; font-weight: 500;
    }
    .chip-btn:hover { border-color: var(--red); color: var(--red); }
    .chip-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── Card list ── */
    .list-wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

    .card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-200);
      margin-bottom: 12px;
      overflow: hidden;
      transition: box-shadow .2s, border-color .2s;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--gray-300); }
    .card.open { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,36,66,.06), var(--shadow-md); }

    .card-header {
      padding: 16px 18px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
    }

    /* Source dot */
    .src-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    }
    .src-dot.community { background: var(--red); box-shadow: 0 0 0 3px rgba(255,36,66,.15); }
    .src-dot.trade     { background: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,53,.15); }
    .src-dot.blackbox  { background: var(--gray-400); box-shadow: 0 0 0 3px rgba(161,161,170,.15); }

    .card-main { flex: 1; min-width: 0; }
    .card-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .violation-name { font-size: 15px; font-weight: 700; color: var(--gray-900); }

    .tag {
      padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .tag-community { background: var(--red-bg); color: var(--red); }
    .tag-trade     { background: var(--orange-bg); color: var(--orange); }
    .tag-blackbox  { background: var(--gray-100); color: var(--gray-600); }
    .tag-am        { background: #f0fdf4; color: #16a34a; }

    .card-summary { font-size: 12.5px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* Freq badge */
    .freq-badge {
      display: flex; align-items: center; gap: 4px;
      background: var(--gray-100); border-radius: 20px;
      padding: 4px 10px; font-size: 12px; color: var(--gray-600); font-weight: 600;
    }
    .freq-badge.high { background: #fff7ed; color: #ea580c; }
    .freq-badge.mid  { background: #fef9c3; color: #ca8a04; }

    .plus-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--gray-100); border: none;
      color: var(--gray-600); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .plus-btn:hover { background: var(--red-bg); color: var(--red); }

    .chevron { color: var(--gray-400); font-size: 12px; transition: transform .2s; }
    .card.open .chevron { transform: rotate(180deg); }

    /* ── Card body ── */
    .card-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--gray-100);
    }
    .card.open .card-body { display: block; }

    .section { margin-top: 16px; }
    .section-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px;
    }
    .desc-text {
      font-size: 13.5px; color: var(--gray-600); line-height: 1.75; white-space: pre-wrap;
    }
    .desc-text a { color: var(--red); text-decoration: none; word-break: break-all; }
    .desc-text a:hover { text-decoration: underline; }

    .advice-block {
      background: linear-gradient(135deg, #fff8f8 0%, #fff0f2 100%);
      border: 1px solid rgba(255,36,66,.12);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 13.5px; color: var(--gray-600); line-height: 1.8; white-space: pre-wrap;
    }

    .merchant-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .merchant-tag {
      background: #fff7ed; color: #c2410c;
      border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500;
    }
    .empty-tag { font-size: 13px; color: var(--gray-400); font-style: italic; }

    /* Freq history */
    .freq-section {
      background: var(--gray-100); border-radius: var(--radius-sm);
      padding: 12px 14px; display: flex; align-items: center; gap: 14px;
    }
    .freq-big { font-size: 32px; font-weight: 800; color: var(--gray-800); line-height: 1; }
    .freq-sub { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

    .card-footer-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--gray-100);
    }
    .footer-meta { font-size: 11px; color: var(--gray-400); display: flex; gap: 10px; }
    .edit-link {
      font-size: 12px; color: var(--gray-400); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all .15s;
    }
    .edit-link:hover { background: var(--gray-100); color: var(--gray-800); }

    /* ── Empty / Error ── */
    .state-msg {
      text-align: center; padding: 64px 20px; color: var(--gray-400);
    }
    .state-msg .big { font-size: 40px; margin-bottom: 12px; }
    .state-msg p { font-size: 14px; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 200;
      align-items: flex-end; justify-content: center;
      padding: 0;
    }
    .overlay.open { display: flex; }
    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 20px; }
      .modal { border-radius: var(--radius-lg) !important; max-height: 90vh; }
    }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; max-width: 580px;
      max-height: 95vh; overflow-y: auto;
      padding: 24px 20px 32px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-drag { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12.5px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; display: block; }
    .form-label .req { color: var(--red); }
    .form-control {
      width: 100%; padding: 10px 12px;
      background: var(--gray-100); border: 1.5px solid transparent;
      border-radius: var(--radius-sm); font-size: 14px;
      color: var(--gray-900); font-family: inherit; outline: none;
      transition: all .2s;
    }
    .form-control:focus { background: #fff; border-color: var(--red); }
    textarea.form-control { min-height: 88px; resize: vertical; }
    .form-hint { font-size: 11.5px; color: var(--gray-400); margin-top: 5px; }

    .bb-check {
      display: flex; align-items: center; gap: 8px;
      font-size: 13.5px; color: var(--gray-600); cursor: pointer;
      padding: 10px 12px; background: var(--gray-100); border-radius: var(--radius-sm);
    }
    .bb-check input { accent-color: var(--red); cursor: pointer; }

    .divider { height: 1px; background: var(--gray-200); margin: 18px 0; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-ghost {
      padding: 10px 18px; border: 1.5px solid var(--gray-200); background: #fff;
      border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; color: var(--gray-600);
      font-weight: 500; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--gray-300); }
    .btn-primary {
      padding: 10px 22px; background: var(--red); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: .88; }
    .submit-tip { font-size: 13px; color: var(--gray-400); align-self: center; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--gray-900); color: #fff;
      padding: 11px 22px; border-radius: 30px; font-size: 13.5px;
      z-index: 300; opacity: 0; transition: opacity .25s;
      pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .hero { padding: 24px 16px 20px; }
      .list-wrap { padding: 14px 10px 60px; }
      .card-summary { display: none; }
      .hero-text p { display: none; }
    }
  </style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-top">
    <div class="hero-icon">⚠️</div>
    <div class="hero-text">
      <h1>违规案例库</h1>
      <p>亲子生活二组 · 内部共享 · 持续更新</p>
    </div>
    <button class="hero-add-btn" onclick="openModal()">＋ 新增案例</button>
  </div>
  <div class="hero-stats">
    <div class="stat-chip">共 <strong id="totalCount">—</strong> 条案例</div>
    <div class="stat-chip">显示 <strong id="showCount">—</strong> 条</div>
    <div class="stat-chip" id="loadingChip">加载中…</div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索违规原因、描述、建议…" oninput="renderCards()" />
  </div>
  <div class="filters">
    <button class="chip-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="chip-btn" onclick="setFilter('社区',this)">社区</button>
    <button class="chip-btn" onclick="setFilter('交易',this)">交易</button>
    <button class="chip-btn" onclick="setFilter('blackbox',this)">🔒 黑盒</button>
  </div>
</div>

<!-- Cards -->
<div class="list-wrap">
  <div id="cardList"></div>
  <div id="emptyState" class="state-msg" style="display:none">
    <div class="big">🔍</div><p>没有找到匹配的案例</p>
  </div>
  <div id="errorState" class="state-msg" style="display:none">
    <div class="big">⚠️</div><p id="errorMsg">数据加载失败，请刷新重试</p>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modalTitle">新增违规案例</div>

    <div class="form-group">
      <label class="form-label">处置来源 <span class="req">*</span></label>
      <select class="form-control" id="f_source">
        <option value="社区">社区</option>
        <option value="交易">交易</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">违规原因 <span class="req">*</span></label>
      <input class="form-control" id="f_reason" type="text" placeholder="例：封标跟风、工业化流水号…" />
    </div>
    <div class="form-group">
      <label class="form-label">违规描述</label>
      <textarea class="form-control" id="f_desc" placeholder="违规的具体表现和判定标准…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">规避建议</label>
      <textarea class="form-control" id="f_advice" placeholder="如何整改和规避此类违规…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">关联商家</label>
      <input class="form-control" id="f_merchants" type="text" placeholder="商家名称，多个用逗号分隔" />
    </div>
    <div class="form-group">
      <label class="form-label">提报 AM <span class="req">*</span></label>
      <input class="form-control" id="f_am" type="text" placeholder="你的名字，例：见夏" />
    </div>
    <div class="form-group">
      <label class="bb-check">
        <input type="checkbox" id="f_blackbox" onchange="toggleBB()" />
        🔒 黑盒违规（审核未说明原因，以频次记录为主）
      </label>
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label class="form-label">团队密码 <span class="req">*</span></label>
      <input class="form-control" id="f_token" type="password" placeholder="请输入团队密码" />
      <div class="form-hint">联系青青获取密码，组内共享同一个</div>
    </div>

    <div class="modal-actions">
      <span class="submit-tip" id="submitTip" style="display:none">提交中…</span>
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="submitBtn" onclick="submitCase()">保存案例</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER   = '2218248146-ai';
const REPO    = 'violation-cases';
const FILE    = 'cases.json';
const RAW_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}`;
const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const PWD_HASH = '9e3dcd1c6f0b3658235cb57e5f5326af8241939764ca8414cee9da15da9726cb';
const GH_TOKEN = atob('Z2hwX0xsTDlDT3JZaHh4SldZVzgwWXFiNTBJakYzbklOMjB2aHd2RQ==');

let cases = [];
let currentFilter = 'all';
let editingId = null;

// ── 加载 ──
async function loadCases() {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cases = await res.json();
    document.getElementById('loadingChip').style.display = 'none';
    renderCards();
  } catch(e) {
    document.getElementById('loadingChip').style.display = 'none';
    document.getElementById('errorState').style.display = '';
    document.getElementById('errorMsg').textContent = '数据加载失败：' + e.message;
  }
}

// ── 渲染 ──
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return cases.filter(c => {
    if (currentFilter === 'blackbox' && !c.blackbox) return false;
    if (currentFilter === '社区' && c.source !== '社区') return false;
    if (currentFilter === '交易' && c.source !== '交易') return false;
    if (!q) return true;
    return [c.reason, c.desc, c.advice, (c.merchants||[]).join(' '), c.am||'']
      .join(' ').toLowerCase().includes(q);
  });
}

function renderCards() {
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = cases.length;
  document.getElementById('showCount').textContent = filtered.length;
  const list = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0 && cases.length > 0) {
    list.innerHTML = ''; empty.style.display = ''; return;
  }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(c => cardHTML(c)).join('');
}

function freqClass(n) {
  if (n >= 5) return 'high';
  if (n >= 3) return 'mid';
  return '';
}

function cardHTML(c) {
  const isBlackbox = c.blackbox;
  const srcClass = isBlackbox ? 'blackbox' : c.source === '社区' ? 'community' : 'trade';
  const tagClass = isBlackbox ? 'tag-blackbox' : c.source === '社区' ? 'tag-community' : 'tag-trade';
  const tagLabel = isBlackbox ? '🔒 黑盒' : c.source;
  const freq = c.freq || 1;
  const mc = (c.merchants||[]).length;
  const summary = (c.desc||'').replace(/\n/g,' ').slice(0,50) + ((c.desc||'').length>50?'…':'');

  return `<div class="card" id="card-${c.id}">
    <div class="card-header" onclick="toggleCard(${c.id})">
      <span class="src-dot ${srcClass}"></span>
      <div class="card-main">
        <div class="card-row1">
          <span class="violation-name">${esc(c.reason)}</span>
          <span class="tag ${tagClass}">${tagLabel}</span>
          ${c.am ? `<span class="tag tag-am">${esc(c.am)}</span>` : ''}
        </div>
        ${summary ? `<div class="card-summary">${esc(summary)}</div>` : ''}
      </div>
      <div class="card-right">
        <span class="freq-badge ${freqClass(freq)}">🔁 ${freq}</span>
        <button class="plus-btn" title="再次发生 +1" onclick="plusOne(${c.id},event)">+</button>
        <span class="chevron">▾</span>
      </div>
    </div>
    <div class="card-body">
      ${c.desc ? `<div class="section">
        <div class="section-label">违规描述</div>
        <div class="desc-text">${linkify(esc(c.desc))}</div>
      </div>` : ''}
      ${c.advice ? `<div class="section">
        <div class="section-label">规避建议</div>
        <div class="advice-block">${esc(c.advice)}</div>
      </div>` : ''}
      <div class="section">
        <div class="section-label">关联商家</div>
        ${mc > 0
          ? `<div class="merchant-row">${(c.merchants||[]).map(m=>`<span class="merchant-tag">${esc(m)}</span>`).join('')}</div>`
          : '<span class="empty-tag">暂无记录</span>'}
      </div>
      <div class="section">
        <div class="section-label">触发频次</div>
        <div class="freq-section">
          <div>
            <div class="freq-big">${freq}</div>
            <div class="freq-sub">次触发记录</div>
          </div>
          <div style="font-size:13px;color:var(--gray-400);line-height:1.6;">
            每次此违规再次出现<br>点卡片右上角「+」记录一次
          </div>
        </div>
      </div>
      <div class="card-footer-row">
        <div class="footer-meta">
          ${c.am ? `<span>📌 ${esc(c.am)}</span>` : ''}
          ${c.createdAt ? `<span>📅 ${c.createdAt}</span>` : ''}
          ${c.updatedAt ? `<span>✏️ 更新于 ${c.updatedAt}</span>` : ''}
        </div>
        <button class="edit-link" onclick="openEdit(${c.id});event.stopPropagation()">编辑</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById('card-'+id)?.classList.toggle('open');
}
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.chip-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── +1 频次 ──
async function plusOne(id, e) {
  e.stopPropagation();
  const c = cases.find(x=>x.id===id);
  if (!c) return;

  // 弹出密码确认
  const pwd = prompt('输入团队密码以记录频次：');
  if (!pwd) return;

  const encoder = new TextEncoder();
  const hashBuf = await crypto.subtle.digest('SHA-256', encoder.encode(pwd));
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }

  showToast('记录中…');
  try {
    const updated = cases.map(x => x.id===id ? {...x, freq: (x.freq||1)+1, updatedAt: new Date().toISOString().slice(0,10)} : x);
    await pushToGithub(updated, `freq+1: ${c.reason}`);
    cases = updated;
    renderCards();
    showToast('✅ 已记录 +1');
  } catch(err) {
    showToast('❌ ' + err.message);
  }
}

// ── Modal ──
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增违规案例';
  ['f_reason','f_desc','f_advice','f_merchants','f_am','f_token'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_source').value = '社区';
  document.getElementById('f_blackbox').checked = false;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f_reason').focus(), 100);
}
function openEdit(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑案例';
  document.getElementById('f_source').value = c.source;
  document.getElementById('f_reason').value = c.reason;
  document.getElementById('f_desc').value = c.desc||'';
  document.getElementById('f_advice').value = c.advice||'';
  document.getElementById('f_merchants').value = (c.merchants||[]).join('，');
  document.getElementById('f_am').value = c.am||'';
  document.getElementById('f_blackbox').checked = !!c.blackbox;
  document.getElementById('f_token').value = '';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e)   { if(e.target===document.getElementById('overlay')) closeModal(); }
function toggleBB()   {} // 保留接口

// ── 提交 ──
async function submitCase() {
  const reason = document.getElementById('f_reason').value.trim();
  const am     = document.getElementById('f_am').value.trim();
  const pwd    = document.getElementById('f_token').value.trim();
  if (!reason) { showToast('请填写违规原因'); return; }
  if (!am)     { showToast('请填写提报 AM'); return; }
  if (!pwd)    { showToast('请输入团队密码'); return; }

  const encoder = new TextEncoder();
  const hashBuf = await crypto.subtle.digest('SHA-256', encoder.encode(pwd));
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }

  const btn = document.getElementById('submitBtn');
  const tip = document.getElementById('submitTip');
  btn.disabled = true; tip.style.display = '';

  const merchants = document.getElementById('f_merchants').value.trim();
  const today = new Date().toISOString().slice(0,10);

  try {
    let updated;
    if (editingId) {
      updated = cases.map(x => x.id===editingId ? {
        ...x,
        source: document.getElementById('f_source').value,
        reason, am,
        desc: document.getElementById('f_desc').value.trim(),
        advice: document.getElementById('f_advice').value.trim(),
        merchants: merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [],
        blackbox: document.getElementById('f_blackbox').checked,
        updatedAt: today
      } : x);
    } else {
      const newCase = {
        id: Date.now(),
        source: document.getElementById('f_source').value,
        reason, am,
        desc: document.getElementById('f_desc').value.trim(),
        advice: document.getElementById('f_advice').value.trim(),
        merchants: merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [],
        blackbox: document.getElementById('f_blackbox').checked,
        freq: 1,
        createdAt: today
      };
      updated = [newCase, ...cases];
    }

    await pushToGithub(updated, editingId ? `update: 编辑 ${reason}` : `add: 新增 ${reason}`);
    cases = updated;
    renderCards();
    closeModal();
    showToast(editingId ? '✅ 案例已更新' : '✅ 新案例已保存，刷新后全组可见');
  } catch(err) {
    showToast('❌ ' + err.message);
  } finally {
    btn.disabled = false; tip.style.display = 'none';
  }
}

// ── GitHub 写入 ──
async function pushToGithub(data, msg) {
  const metaRes = await fetch(API_URL, {
    headers: { Authorization: 'token ' + GH_TOKEN, 'User-Agent': 'violation-cases-app' }
  });
  if (!metaRes.ok) throw new Error('获取文件信息失败');
  const meta = await metaRes.json();

  const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const pushRes = await fetch(API_URL, {
    method: 'PUT',
    headers: {
      Authorization: 'token ' + GH_TOKEN,
      'Content-Type': 'application/json',
      'User-Agent': 'violation-cases-app'
    },
    body: JSON.stringify({ message: msg, content: newContent, sha: meta.sha })
  });
  if (!pushRes.ok) {
    const err = await pushRes.json();
    throw new Error(err.message || '推送失败');
  }
}

// ── 工具 ──
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

loadCases();
