<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>违规案例库 · 亲子生活二组</title>
  <style>
    :root {
      --red: #ff2442;
      --red-soft: #ff6b81;
      --red-bg: #fff0f2;
      --orange: #ff6b35;
      --orange-bg: #fff4f0;
      --gray-50: #fafafa;
      --gray-100: #f4f4f5;
      --gray-200: #e4e4e7;
      --gray-300: #d1d1d6;
      --gray-400: #a1a1aa;
      --gray-600: #52525b;
      --gray-800: #27272a;
      --gray-900: #18181b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon {
      width: 36px; height: 36px; background: var(--red-bg);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 17px; font-weight: 700; color: var(--gray-900); }
    .header-text p { font-size: 12px; color: var(--gray-400); margin-top: 1px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .stat-pill {
      font-size: 12px; color: var(--gray-600);
      background: var(--gray-100); border-radius: 20px;
      padding: 4px 10px; white-space: nowrap;
    }
    .stat-pill strong { color: var(--gray-900); }
    .btn-add {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 14px;
      background: var(--red); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-add:hover { opacity: .88; }

    /* ── Toolbar ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 24px;
      position: sticky; top: 0; z-index: 100;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 160px; max-width: 320px; position: relative;
    }
    .search-wrap input {
      width: 100%; padding: 7px 12px 7px 32px;
      background: var(--gray-100); border: 1.5px solid transparent;
      border-radius: var(--radius-sm); font-size: 13px;
      color: var(--gray-900); outline: none; transition: all .2s;
    }
    .search-wrap input:focus { background: #fff; border-color: var(--red); }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); font-size: 13px; pointer-events: none;
    }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip-btn {
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--gray-200); background: #fff;
      font-size: 12px; color: var(--gray-600); cursor: pointer;
      transition: all .15s; white-space: nowrap; font-weight: 500;
    }
    .chip-btn:hover { border-color: var(--red); color: var(--red); }
    .chip-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── Table ── */
    .table-wrap {
      padding: 16px 24px 60px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    thead tr {
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }
    th {
      padding: 11px 14px;
      font-size: 11.5px; font-weight: 700;
      color: var(--gray-400); letter-spacing: .5px;
      text-align: left; white-space: nowrap;
      border-bottom: 1px solid var(--gray-200);
    }
    td {
      padding: 0;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }

    .row-main td { cursor: pointer; }
    .row-main:hover td { background: var(--gray-50); }
    .row-main.open td { background: #fffbfc; }

    .cell-inner { padding: 12px 14px; }

    /* AM cell */
    .am-badge {
      display: inline-block;
      background: #f0fdf4; color: #16a34a;
      border-radius: 6px; padding: 2px 8px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }

    /* Source cell */
    .src-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 12px;
      font-size: 11.5px; font-weight: 600; white-space: nowrap;
    }
    .src-tag.community { background: var(--red-bg); color: var(--red); }
    .src-tag.trade     { background: var(--orange-bg); color: var(--orange); }
    .src-tag.blackbox  { background: var(--gray-100); color: var(--gray-600); }

    /* Reason cell */
    .reason-cell { display: flex; align-items: center; gap: 8px; }
    .reason-name { font-size: 14px; font-weight: 700; color: var(--gray-900); }
    .freq-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--gray-100); border-radius: 20px;
      padding: 2px 8px; font-size: 11.5px; color: var(--gray-600); font-weight: 600;
      white-space: nowrap;
    }
    .freq-badge.high { background: #fff7ed; color: #ea580c; }
    .freq-badge.mid  { background: #fef9c3; color: #ca8a04; }

    /* Desc / Advice cell */
    .cell-text {
      font-size: 12.5px; color: var(--gray-600); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 260px;
    }
    .row-main.open .cell-text {
      display: block; -webkit-line-clamp: unset; overflow: visible;
    }

    /* Action cell */
    .action-cell { display: flex; align-items: center; gap: 6px; padding: 12px 10px; }
    .plus-btn {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--gray-100); border: none;
      color: var(--gray-600); font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .plus-btn:hover { background: var(--red-bg); color: var(--red); }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: none; border: none;
      color: var(--gray-400); font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .icon-btn:hover { background: var(--gray-100); color: var(--gray-800); }
    .icon-btn.del:hover { background: #fee2e2; color: #ef4444; }

    .chevron { color: var(--gray-300); font-size: 11px; transition: transform .2s; margin-left: 2px; }
    .row-main.open .chevron { transform: rotate(180deg); }

    /* ── Expand row ── */
    .row-expand { display: none; }
    .row-expand.open { display: table-row; }
    .expand-cell {
      padding: 0 0 16px 0;
      background: #fffbfc;
      border-bottom: 2px solid var(--red-bg) !important;
    }
    .expand-inner { padding: 0 16px; }

    /* Full text sections in expand */
    .expand-section { margin-bottom: 14px; }
    .expand-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--gray-400);
      margin-bottom: 6px; margin-top: 14px;
    }
    .expand-text {
      font-size: 13px; color: var(--gray-600); line-height: 1.75; white-space: pre-wrap;
    }
    .expand-text a { color: var(--red); text-decoration: none; word-break: break-all; }
    .expand-text a:hover { text-decoration: underline; }
    .advice-block {
      background: linear-gradient(135deg, #fff8f8 0%, #fff0f2 100%);
      border: 1px solid rgba(255,36,66,.12);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 13px; color: var(--gray-600); line-height: 1.8; white-space: pre-wrap;
    }

    /* Records table */
    .records-wrap { margin-top: 4px; }
    .records-table {
      width: 100%; border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); overflow: hidden;
      box-shadow: none; background: #fff;
    }
    .records-table th {
      background: var(--gray-50); font-size: 11px;
      padding: 7px 12px; color: var(--gray-400);
    }
    .records-table td {
      padding: 0; border-bottom: 1px solid var(--gray-100);
    }
    .records-table tbody tr:last-child td { border-bottom: none; }
    .records-table .cell-inner { padding: 8px 12px; }
    .record-merchant {
      background: #fff7ed; color: #c2410c;
      border-radius: 5px; padding: 1px 7px;
      font-size: 11.5px; font-weight: 500; white-space: nowrap;
      display: inline-block; margin: 2px 2px 2px 0;
    }
    .record-date { font-size: 12px; color: var(--gray-400); white-space: nowrap; }
    .record-am   { font-size: 12px; font-weight: 600; color: var(--gray-700); white-space: nowrap; }
    .no-records  { font-size: 12.5px; color: var(--gray-400); font-style: italic; padding: 10px 12px; }

    /* ── Empty / Error ── */
    .state-msg {
      text-align: center; padding: 64px 20px; color: var(--gray-400);
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
    }
    .state-msg .big { font-size: 36px; margin-bottom: 10px; }
    .state-msg p { font-size: 14px; }

    /* ── Modal (新增案例) ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 200;
      align-items: flex-end; justify-content: center;
      padding: 0;
    }
    .overlay.open { display: flex; }
    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 20px; }
      .modal { border-radius: var(--radius-lg) !important; max-height: 90vh; }
    }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; max-width: 560px;
      max-height: 95vh; overflow-y: auto;
      padding: 24px 20px 32px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-drag { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12.5px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; display: block; }
    .form-label .req { color: var(--red); }
    .form-control {
      width: 100%; padding: 10px 12px;
      background: var(--gray-100); border: 1.5px solid transparent;
      border-radius: var(--radius-sm); font-size: 14px;
      color: var(--gray-900); font-family: inherit; outline: none;
      transition: all .2s;
    }
    .form-control:focus { background: #fff; border-color: var(--red); }
    textarea.form-control { min-height: 80px; resize: vertical; }
    .form-hint { font-size: 11.5px; color: var(--gray-400); margin-top: 5px; }

    .bb-check {
      display: flex; align-items: center; gap: 8px;
      font-size: 13.5px; color: var(--gray-600); cursor: pointer;
      padding: 10px 12px; background: var(--gray-100); border-radius: var(--radius-sm);
    }
    .bb-check input { accent-color: var(--red); cursor: pointer; }
    .divider { height: 1px; background: var(--gray-200); margin: 16px 0; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-ghost {
      padding: 9px 18px; border: 1.5px solid var(--gray-200); background: #fff;
      border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; color: var(--gray-600);
      font-weight: 500; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--gray-300); }
    .btn-primary {
      padding: 9px 22px; background: var(--red); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: .88; }
    .submit-tip { font-size: 13px; color: var(--gray-400); align-self: center; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--gray-900); color: #fff;
      padding: 10px 20px; border-radius: 30px; font-size: 13.5px;
      z-index: 300; opacity: 0; transition: opacity .25s;
      pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">⚠️</div>
  <div class="header-text">
    <h1>违规案例库</h1>
    <p>亲子生活二组 · 内部共享 · 持续更新</p>
  </div>
  <div class="header-actions">
    <div class="stat-pill">共 <strong id="totalCount">—</strong> 条 · 显示 <strong id="showCount">—</strong> 条</div>
    <button class="btn-add" onclick="openModal()">＋ 新增案例</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索违规原因、描述、建议…" oninput="renderTable()" />
  </div>
  <div class="filters">
    <button class="chip-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="chip-btn" onclick="setFilter('社区',this)">社区</button>
    <button class="chip-btn" onclick="setFilter('交易',this)">交易</button>
    <button class="chip-btn" onclick="setFilter('blackbox',this)">🔒 黑盒</button>
  </div>
</div>

<!-- Table -->
<div class="table-wrap">
  <div id="tableContainer"></div>
  <div id="emptyState" class="state-msg" style="display:none">
    <div class="big">🔍</div><p>没有找到匹配的案例</p>
  </div>
  <div id="errorState" class="state-msg" style="display:none">
    <div class="big">⚠️</div><p id="errorMsg">数据加载失败，请刷新重试</p>
  </div>
</div>

<!-- Modal: 新增/编辑案例 -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modalTitle">新增违规案例</div>

    <div class="form-group">
      <label class="form-label">处置来源 <span class="req">*</span></label>
      <select class="form-control" id="f_source">
        <option value="社区">社区</option>
        <option value="交易">交易</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">违规原因 <span class="req">*</span></label>
      <input class="form-control" id="f_reason" type="text" placeholder="例：封标跟风、工业化流水号…" />
    </div>
    <div class="form-group">
      <label class="form-label">违规描述</label>
      <textarea class="form-control" id="f_desc" placeholder="违规的具体表现和判定标准…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">规避建议</label>
      <textarea class="form-control" id="f_advice" placeholder="如何整改和规避此类违规…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">🔒 黑盒违规</label>
      <label class="bb-check">
        <input type="checkbox" id="f_blackbox" />
        审核未说明原因，以频次记录为主
      </label>
    </div>

    <div class="divider"></div>
    <div style="font-size:12px;color:var(--gray-400);margin-bottom:12px;">首次触发记录（新增后可通过「+」继续添加）</div>

    <div class="form-group">
      <label class="form-label">提报 AM <span class="req">*</span></label>
      <input class="form-control" id="f_am" type="text" placeholder="你的名字，例：见夏" />
    </div>
    <div class="form-group">
      <label class="form-label">关联商家</label>
      <input class="form-control" id="f_merchants" type="text" placeholder="商家名称，多个用逗号分隔" />
    </div>
    <div class="form-group">
      <label class="form-label">提报日期</label>
      <input class="form-control" id="f_date" type="date" />
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label class="form-label">团队密码 <span class="req">*</span></label>
      <input class="form-control" id="f_token" type="password" placeholder="请输入团队密码" />
      <div class="form-hint">联系青青获取密码，组内共享同一个</div>
    </div>

    <div class="modal-actions">
      <span class="submit-tip" id="submitTip" style="display:none">提交中…</span>
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="submitBtn" onclick="submitCase()">保存案例</button>
    </div>
  </div>
</div>

<!-- Modal: 新增触发记录 -->
<div class="overlay" id="recordOverlay" onclick="bgCloseRecord(event)">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="recordModalTitle">记录一次触发</div>
    <div style="font-size:13px;color:var(--gray-400);margin-bottom:16px;" id="recordViolationName"></div>

    <div class="form-group">
      <label class="form-label">提报 AM <span class="req">*</span></label>
      <input class="form-control" id="r_am" type="text" placeholder="你的名字" />
    </div>
    <div class="form-group">
      <label class="form-label">关联商家</label>
      <input class="form-control" id="r_merchants" type="text" placeholder="商家名称，多个用逗号分隔" />
    </div>
    <div class="form-group">
      <label class="form-label">提报日期 <span class="req">*</span></label>
      <input class="form-control" id="r_date" type="date" />
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label class="form-label">团队密码 <span class="req">*</span></label>
      <input class="form-control" id="r_token" type="password" placeholder="请输入团队密码" />
    </div>

    <div class="modal-actions">
      <span class="submit-tip" id="recordTip" style="display:none">提交中…</span>
      <button class="btn-ghost" onclick="closeRecordModal()">取消</button>
      <button class="btn-primary" id="recordBtn" onclick="submitRecord()">记录触发</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://violation-cases.vercel.app/api';
const PWD_HASH = '9e3dcd1c6f0b3658235cb57e5f5326af8241939764ca8414cee9da15da9726cb';

let cases = [];
let currentFilter = 'all';
let editingId = null;
let recordingId = null;
let currentPwd = '';
let openRows = new Set();

// ── 数据迁移：旧格式 → 新格式 ──
function migrate(c) {
  if (c.records) return c; // 已经是新格式
  const records = [];
  // 把旧的触发次数整合成记录（按 freq 数量，信息尽量保留）
  const merchants = c.merchants && c.merchants.length ? c.merchants : [];
  const count = c.freq || 1;
  for (let i = 0; i < count; i++) {
    records.push({
      id: (c.id || Date.now()) + i,
      am: c.am || '',
      merchants: i === 0 ? merchants : [],
      date: c.updatedAt || c.createdAt || new Date().toISOString().slice(0,10)
    });
  }
  return { ...c, records, freq: undefined, merchants: undefined };
}

// ── 加载 ──
async function loadCases() {
  try {
    const res = await fetch(API_URL + '/cases?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    cases = raw.map(migrate);
    renderTable();
  } catch(e) {
    document.getElementById('errorState').style.display = '';
    document.getElementById('errorMsg').textContent = '数据加载失败：' + e.message;
  }
}

// ── 过滤 ──
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return cases.filter(c => {
    if (currentFilter === 'blackbox' && !c.blackbox) return false;
    if (currentFilter === '社区' && c.source !== '社区') return false;
    if (currentFilter === '交易' && c.source !== '交易') return false;
    if (!q) return true;
    const records = c.records || [];
    const merchantStr = records.flatMap(r => r.merchants||[]).join(' ');
    const amStr = records.map(r => r.am||'').join(' ');
    return [c.reason, c.desc, c.advice, merchantStr, amStr]
      .join(' ').toLowerCase().includes(q);
  });
}

// ── 渲染表格 ──
function renderTable() {
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = cases.length;
  document.getElementById('showCount').textContent = filtered.length;

  const container = document.getElementById('tableContainer');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0 && cases.length > 0) {
    container.innerHTML = ''; empty.style.display = ''; return;
  }
  empty.style.display = 'none';

  let html = `<table>
    <thead>
      <tr>
        <th style="width:80px">提报 AM</th>
        <th style="width:80px">来源</th>
        <th style="width:180px">违规原因</th>
        <th>违规描述</th>
        <th>规避建议</th>
        <th style="width:90px"></th>
      </tr>
    </thead>
    <tbody>`;

  filtered.forEach(c => {
    const isOpen = openRows.has(c.id);
    const records = c.records || [];
    const freq = records.length;
    const isBlackbox = c.blackbox;
    const srcClass = isBlackbox ? 'blackbox' : c.source === '社区' ? 'community' : 'trade';
    const srcLabel = isBlackbox ? '🔒 黑盒' : c.source;
    const fClass = freq >= 5 ? 'high' : freq >= 3 ? 'mid' : '';
    // 第一条 record 的 AM 作为主提报人
    const primaryAM = records.length > 0 ? records[0].am : (c.am || '');

    html += `
    <tr class="row-main${isOpen?' open':''}" onclick="toggleRow(${c.id})" data-id="${c.id}">
      <td><div class="cell-inner">${primaryAM ? `<span class="am-badge">${esc(primaryAM)}</span>` : '<span style="color:var(--gray-400);font-size:12px;">—</span>'}</div></td>
      <td><div class="cell-inner"><span class="src-tag ${srcClass}">${srcLabel}</span></div></td>
      <td><div class="cell-inner">
        <div class="reason-cell">
          <span class="reason-name">${esc(c.reason)}</span>
          <span class="freq-badge ${fClass}">🔁 ${freq}</span>
        </div>
      </div></td>
      <td><div class="cell-inner"><div class="cell-text">${esc(c.desc||'—')}</div></div></td>
      <td><div class="cell-inner"><div class="cell-text">${esc(c.advice||'—')}</div></div></td>
      <td>
        <div class="action-cell">
          <button class="plus-btn" title="记录一次触发" onclick="openRecordModal(${c.id},event)">+</button>
          <button class="icon-btn" title="编辑案例" onclick="openEdit(${c.id});event.stopPropagation()">✏️</button>
          <button class="icon-btn del" title="删除" onclick="deleteCase(${c.id});event.stopPropagation()">🗑</button>
          <span class="chevron">▾</span>
        </div>
      </td>
    </tr>
    <tr class="row-expand${isOpen?' open':''}" data-expand="${c.id}">
      <td class="expand-cell" colspan="6">
        <div class="expand-inner">
          ${c.desc ? `<div class="expand-label">违规描述</div>
          <div class="expand-text">${linkify(esc(c.desc))}</div>` : ''}
          ${c.advice ? `<div class="expand-label">规避建议</div>
          <div class="advice-block">${esc(c.advice)}</div>` : ''}
          <div class="expand-label">触发记录（${freq} 次）</div>
          <div class="records-wrap">${recordsTableHTML(records)}</div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:10px;">
            📅 创建于 ${c.createdAt||'—'} · 最后更新 ${c.updatedAt||'—'}
            &nbsp;·&nbsp;
            <button class="icon-btn" style="display:inline-flex;height:20px;font-size:11px;color:var(--gray-400);padding:0 4px;" onclick="openEdit(${c.id});event.stopPropagation()">编辑案例详情</button>
          </div>
        </div>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function recordsTableHTML(records) {
  if (!records || records.length === 0) {
    return `<div class="no-records">暂无触发记录</div>`;
  }
  let html = `<table class="records-table">
    <thead><tr>
      <th style="width:80px">提报 AM</th>
      <th>关联商家</th>
      <th style="width:100px">提报日期</th>
    </tr></thead>
    <tbody>`;
  // 倒序显示，最新的在前
  [...records].reverse().forEach(r => {
    const merchants = r.merchants && r.merchants.length
      ? r.merchants.map(m => `<span class="record-merchant">${esc(m)}</span>`).join('')
      : '<span style="color:var(--gray-400);font-size:12px;">—</span>';
    html += `<tr>
      <td><div class="cell-inner"><span class="record-am">${esc(r.am||'—')}</span></div></td>
      <td><div class="cell-inner">${merchants}</div></td>
      <td><div class="cell-inner"><span class="record-date">${r.date||'—'}</span></div></td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function toggleRow(id) {
  if (openRows.has(id)) openRows.delete(id);
  else openRows.add(id);
  // 只更新对应行，不重新渲染全表
  const mainRow = document.querySelector(`tr.row-main[data-id="${id}"]`);
  const expRow  = document.querySelector(`tr.row-expand[data-expand="${id}"]`);
  if (mainRow) mainRow.classList.toggle('open', openRows.has(id));
  if (expRow)  expRow.classList.toggle('open',  openRows.has(id));
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.chip-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── 新增触发记录 Modal ──
function openRecordModal(id, e) {
  e.stopPropagation();
  recordingId = id;
  const c = cases.find(x=>x.id===id);
  document.getElementById('recordViolationName').textContent = c ? `「${c.reason}」` : '';
  document.getElementById('r_am').value = '';
  document.getElementById('r_merchants').value = '';
  document.getElementById('r_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('r_token').value = currentPwd; // 记住上次输入
  document.getElementById('recordOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('r_am').focus(), 100);
}
function closeRecordModal() { document.getElementById('recordOverlay').classList.remove('open'); }
function bgCloseRecord(e) { if(e.target===document.getElementById('recordOverlay')) closeRecordModal(); }

async function submitRecord() {
  const am   = document.getElementById('r_am').value.trim();
  const date = document.getElementById('r_date').value.trim();
  const pwd  = document.getElementById('r_token').value.trim();
  if (!am)   { showToast('请填写提报 AM'); return; }
  if (!date) { showToast('请填写提报日期'); return; }
  if (!pwd)  { showToast('请输入团队密码'); return; }

  const hashHex = await sha256(pwd);
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }
  currentPwd = pwd;

  const merchants = document.getElementById('r_merchants').value.trim();
  const merchantList = merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [];

  const btn = document.getElementById('recordBtn');
  const tip = document.getElementById('recordTip');
  btn.disabled = true; tip.style.display = '';

  try {
    const updated = cases.map(c => {
      if (c.id !== recordingId) return c;
      const newRecord = { id: Date.now(), am, merchants: merchantList, date };
      const records = [...(c.records||[]), newRecord];
      return { ...c, records, updatedAt: date };
    });
    await pushToGithub(toPersist(updated), `record: ${am} 触发 ${cases.find(x=>x.id===recordingId)?.reason||''}`);
    cases = updated;
    if (openRows.has(recordingId)) openRows.delete(recordingId); // 强制重渲展开行
    openRows.add(recordingId);
    renderTable();
    closeRecordModal();
    showToast('✅ 触发记录已保存');
  } catch(err) {
    showToast('❌ ' + err.message);
  } finally {
    btn.disabled = false; tip.style.display = 'none';
  }
}

// ── 新增/编辑案例 Modal ──
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增违规案例';
  ['f_reason','f_desc','f_advice','f_merchants','f_am','f_token'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_source').value = '社区';
  document.getElementById('f_blackbox').checked = false;
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f_token').value = currentPwd;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f_reason').focus(), 100);
}
function openEdit(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑案例';
  document.getElementById('f_source').value = c.source;
  document.getElementById('f_reason').value = c.reason;
  document.getElementById('f_desc').value = c.desc||'';
  document.getElementById('f_advice').value = c.advice||'';
  document.getElementById('f_blackbox').checked = !!c.blackbox;
  // 编辑时不展示首次记录字段（已有记录）
  document.getElementById('f_am').value = '';
  document.getElementById('f_merchants').value = '';
  document.getElementById('f_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f_token').value = currentPwd;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

async function submitCase() {
  const reason = document.getElementById('f_reason').value.trim();
  const pwd    = document.getElementById('f_token').value.trim();
  if (!reason) { showToast('请填写违规原因'); return; }
  if (!pwd)    { showToast('请输入团队密码'); return; }

  const hashHex = await sha256(pwd);
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }
  currentPwd = pwd;

  const btn = document.getElementById('submitBtn');
  const tip = document.getElementById('submitTip');
  btn.disabled = true; tip.style.display = '';

  const today = new Date().toISOString().slice(0,10);

  try {
    let updated;
    if (editingId) {
      updated = cases.map(x => x.id===editingId ? {
        ...x,
        source: document.getElementById('f_source').value,
        reason,
        desc: document.getElementById('f_desc').value.trim(),
        advice: document.getElementById('f_advice').value.trim(),
        blackbox: document.getElementById('f_blackbox').checked,
        updatedAt: today
      } : x);
    } else {
      // 新增：第一条触发记录
      const am = document.getElementById('f_am').value.trim();
      const merchants = document.getElementById('f_merchants').value.trim();
      const date = document.getElementById('f_date').value || today;
      if (!am) { showToast('请填写提报 AM'); btn.disabled=false; tip.style.display='none'; return; }
      const merchantList = merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [];
      const firstRecord = { id: Date.now(), am, merchants: merchantList, date };
      const newCase = {
        id: Date.now() + 1,
        source: document.getElementById('f_source').value,
        reason,
        desc: document.getElementById('f_desc').value.trim(),
        advice: document.getElementById('f_advice').value.trim(),
        blackbox: document.getElementById('f_blackbox').checked,
        records: [firstRecord],
        createdAt: today,
        updatedAt: today
      };
      updated = [newCase, ...cases];
    }
    await pushToGithub(toPersist(updated), editingId ? `update: ${reason}` : `add: ${reason}`);
    cases = updated;
    renderTable();
    closeModal();
    showToast(editingId ? '✅ 案例已更新' : '✅ 新案例已保存');
  } catch(err) {
    showToast('❌ ' + err.message);
  } finally {
    btn.disabled = false; tip.style.display = 'none';
  }
}

// ── 删除 ──
async function deleteCase(id) {
  const c = cases.find(x=>x.id===id);
  if (!c) return;
  const pwd = prompt(`删除「${c.reason}」？输入团队密码确认：`);
  if (!pwd) return;
  const hashHex = await sha256(pwd);
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }
  currentPwd = pwd;
  showToast('删除中…');
  try {
    const updated = cases.filter(x=>x.id!==id);
    await pushToGithub(toPersist(updated), `delete: ${c.reason}`);
    cases = updated;
    openRows.delete(id);
    renderTable();
    showToast('✅ 已删除');
  } catch(err) {
    showToast('❌ ' + err.message);
  }
}

// ── 持久化格式（records 展平，去掉 migration 临时字段）──
function toPersist(data) {
  return data.map(c => {
    const out = { ...c };
    delete out.freq;
    delete out.merchants;
    return out;
  });
}

// ── 写入 ──
async function pushToGithub(data, msg) {
  const res = await fetch(API_URL + '/cases', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pwd: currentPwd, data, message: msg })
  });
  const result = await res.json();
  if (!res.ok || result.error) throw new Error(result.error || '写入失败');
}

// ── 工具 ──
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

loadCases();
</script>
