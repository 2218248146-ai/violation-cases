<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>违规案例库 · 亲子生活二组</title>
  <style>
    :root {
      --red: #ff2442;
      --red-light: #fff0f2;
      --gray-1: #f7f8fa;
      --gray-2: #ebebeb;
      --gray-3: #999;
      --gray-4: #555;
      --gray-5: #222;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--gray-1);
      color: var(--gray-5);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-2);
      padding: 20px 24px 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .logo {
      width: 32px; height: 32px; background: var(--red); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    h1 { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; color: var(--gray-3); margin-left: auto; white-space: nowrap; }
    .add-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 9px 16px; background: var(--red); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: opacity .15s; flex-shrink: 0;
    }
    .add-btn:hover { opacity: .88; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-wrap input {
      width: 100%; padding: 9px 14px 9px 34px;
      border: 1px solid var(--gray-2); border-radius: 8px; font-size: 14px;
      outline: none; background: var(--gray-1); color: var(--gray-5); transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--red); background: #fff; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--gray-3); font-size: 14px; }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 13px; border-radius: 20px; border: 1px solid var(--gray-2);
      background: #fff; font-size: 13px; color: var(--gray-4); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--red); color: var(--red); }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── Stats ── */
    .stats-bar {
      padding: 10px 24px; font-size: 13px; color: var(--gray-3);
      display: flex; align-items: center; gap: 12px;
    }
    .stats-bar strong { color: var(--gray-5); }
    .loading-tip { color: var(--gray-3); font-size: 13px; }

    /* ── Main ── */
    main { max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── Card ── */
    .card {
      background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 12px; border: 1px solid var(--gray-2); overflow: hidden; transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .card-header {
      padding: 15px 18px 13px; display: flex; align-items: flex-start;
      gap: 10px; cursor: pointer; user-select: none;
    }
    .source-badge {
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .s-community { background: #fff0f2; color: #ff2442; }
    .s-trade     { background: #fff4f0; color: #ff6b35; }
    .s-blackbox  { background: #f4f4f4; color: #6b6b6b; }
    .card-title-group { flex: 1; min-width: 0; }
    .violation-reason { font-size: 15px; font-weight: 700; margin-bottom: 3px; line-height: 1.4; }
    .violation-summary {
      font-size: 12px; color: var(--gray-3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .merchant-badge {
      font-size: 11px; color: var(--gray-3); background: var(--gray-1);
      padding: 2px 8px; border-radius: 10px; white-space: nowrap;
    }
    .merchant-badge.has { background: #fff3e0; color: #e65100; }
    .bb-tag { font-size: 11px; color: #6b6b6b; background: #f4f4f4; padding: 2px 8px; border-radius: 10px; }
    .toggle-icon { color: var(--gray-3); font-size: 13px; transition: transform .2s; }
    .card.open .toggle-icon { transform: rotate(180deg); }
    .card-body {
      display: none; padding: 0 18px 18px;
      border-top: 1px solid var(--gray-2);
    }
    .card.open .card-body { display: block; }
    .section { margin-top: 14px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--gray-3);
      letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px;
    }
    .section-content { font-size: 13.5px; color: var(--gray-4); line-height: 1.75; white-space: pre-wrap; }
    .section-content a { color: var(--red); text-decoration: none; word-break: break-all; }
    .section-content a:hover { text-decoration: underline; }
    .advice-box {
      background: #fff8f8; border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0; padding: 11px 14px;
      font-size: 13.5px; color: var(--gray-4); line-height: 1.75; white-space: pre-wrap;
    }
    .blackbox-box { background: #f4f4f4; border-radius: 8px; padding: 12px 14px; }
    .freq-num { font-size: 30px; font-weight: 800; color: #6b6b6b; line-height: 1; }
    .freq-label { font-size: 12px; color: var(--gray-3); margin-top: 3px; }
    .merchant-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .merchant-chip {
      background: #fff3e0; color: #bf360c;
      border-radius: 6px; padding: 3px 9px; font-size: 12px; font-weight: 500;
    }
    .no-data { font-size: 13px; color: var(--gray-3); font-style: italic; }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--gray-2);
    }
    .card-date { font-size: 11px; color: var(--gray-3); }
    .edit-btn {
      font-size: 12px; color: var(--gray-3); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
    }
    .edit-btn:hover { background: var(--gray-1); color: var(--gray-5); }

    /* ── Empty / Error ── */
    .center-msg { text-align: center; padding: 60px 20px; color: var(--gray-3); }
    .center-msg .icon { font-size: 36px; margin-bottom: 10px; }
    .center-msg p { font-size: 14px; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%;
      max-width: 580px; max-height: 92vh; overflow-y: auto; padding: 26px;
    }
    .modal-title {
      font-size: 17px; font-weight: 700; margin-bottom: 20px; color: var(--gray-5);
    }
    .form-row { margin-bottom: 15px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--gray-4); margin-bottom: 6px; display: block; }
    .form-label .req { color: var(--red); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--gray-2); border-radius: 8px;
      font-size: 14px; color: var(--gray-5); font-family: inherit;
      outline: none; transition: border-color .2s; background: #fff;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--red); }
    .form-textarea { min-height: 90px; resize: vertical; }
    .bb-toggle { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--gray-4); cursor: pointer; }
    .bb-toggle input { cursor: pointer; accent-color: var(--red); }
    .token-hint { font-size: 12px; color: var(--gray-3); margin-top: 5px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .btn-cancel {
      padding: 9px 18px; border: 1px solid var(--gray-2); background: #fff;
      border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--gray-4);
    }
    .btn-submit {
      padding: 9px 22px; background: var(--red); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .btn-submit:not(:disabled):hover { opacity: .88; }
    .submitting-tip { font-size: 13px; color: var(--gray-3); align-self: center; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #222; color: #fff; padding: 10px 22px;
      border-radius: 30px; font-size: 14px; z-index: 300;
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      header { padding: 14px 12px 12px; }
      main { padding: 0 10px 60px; }
      .violation-summary { display: none; }
      .subtitle { display: none; }
      .modal { padding: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">违</div>
    <h1>违规案例库</h1>
    <span class="subtitle">亲子生活二组 · 内部共享</span>
    <button class="add-btn" onclick="openModal()">＋ 新增案例</button>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索违规原因、描述、建议…" oninput="renderCards()" />
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('社区',this)">社区</button>
      <button class="filter-btn" onclick="setFilter('交易',this)">交易</button>
      <button class="filter-btn" onclick="setFilter('blackbox',this)">🔒 黑盒</button>
    </div>
  </div>
</header>

<div class="stats-bar">
  <span>共 <strong id="totalCount">—</strong> 条</span>
  <span>|</span>
  <span>显示 <strong id="showCount">—</strong> 条</span>
  <span id="loadingTip" class="loading-tip">加载中…</span>
</div>

<main>
  <div id="cardList"></div>
  <div id="emptyState" class="center-msg" style="display:none">
    <div class="icon">🔍</div><p>没有找到匹配的案例</p>
  </div>
  <div id="errorState" class="center-msg" style="display:none">
    <div class="icon">⚠️</div><p id="errorMsg">加载失败，请刷新重试</p>
  </div>
</main>

<!-- 新增/编辑 Modal -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新增违规案例</div>

    <div class="form-row">
      <label class="form-label">处置来源 <span class="req">*</span></label>
      <select class="form-select" id="f_source">
        <option value="社区">社区</option>
        <option value="交易">交易</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">违规原因 <span class="req">*</span></label>
      <input class="form-input" id="f_reason" type="text" placeholder="例：封标跟风、工业化流水号…" />
    </div>
    <div class="form-row">
      <label class="form-label">违规描述</label>
      <textarea class="form-textarea" id="f_desc" placeholder="违规的具体表现和判定标准…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">规避建议</label>
      <textarea class="form-textarea" id="f_advice" placeholder="如何整改和规避此类违规…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">关联商家</label>
      <input class="form-input" id="f_merchants" type="text" placeholder="商家名称，多个用逗号分隔" />
    </div>
    <div class="form-row">
      <label class="bb-toggle">
        <input type="checkbox" id="f_blackbox" onchange="toggleBB()" />
        🔒 黑盒违规（审核未说明原因，记录频次）
      </label>
    </div>
    <div class="form-row" id="f_freq_row" style="display:none">
      <label class="form-label">出现频次</label>
      <input class="form-input" id="f_freq" type="number" min="1" value="1" />
    </div>
    <div class="form-row">
      <label class="form-label">团队密码 <span class="req">*</span></label>
      <input class="form-input" id="f_token" type="password" placeholder="请输入团队密码" />
      <div class="token-hint">联系青青获取密码，组内共享同一个</div>
    </div>

    <div class="modal-actions">
      <span class="submitting-tip" id="submitTip" style="display:none">提交中…</span>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="submitBtn" onclick="submitCase()">保存案例</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER = '2218248146-ai';
const REPO  = 'violation-cases';
const FILE  = 'cases.json';
const RAW_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}`;
const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
// 团队密码校验（sha256 of 'qinzi2026'）
const PWD_HASH = '9e3dcd1c6f0b3658235cb57e5f5326af8241939764ca8414cee9da15da9726cb';
const GH_TOKEN = atob('Z2hwX0xsTDlDT3JZaHh4SldZVzgwWXFiNTBJakYzbklOMjB2aHd2RQ==');

let cases = [];
let currentFilter = 'all';
let editingId = null;
let fileSha = null; // GitHub 文件 SHA，更新时需要

// ── 加载数据 ──
async function loadCases() {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cases = await res.json();
    document.getElementById('loadingTip').style.display = 'none';
    renderCards();
  } catch(e) {
    document.getElementById('loadingTip').style.display = 'none';
    document.getElementById('errorState').style.display = '';
    document.getElementById('errorMsg').textContent = '数据加载失败：' + e.message;
  }
}

// ── 渲染 ──
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return cases.filter(c => {
    if (currentFilter === 'blackbox' && !c.blackbox) return false;
    if (currentFilter === '社区' && c.source !== '社区') return false;
    if (currentFilter === '交易' && c.source !== '交易') return false;
    if (!q) return true;
    return [c.reason, c.desc, c.advice, (c.merchants||[]).join(' ')]
      .join(' ').toLowerCase().includes(q);
  });
}

function renderCards() {
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = cases.length;
  document.getElementById('showCount').textContent = filtered.length;
  const list = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0 && cases.length > 0) {
    list.innerHTML = ''; empty.style.display = ''; return;
  }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(c => cardHTML(c)).join('');
}

function cardHTML(c) {
  const srcCls = c.blackbox ? 's-blackbox' : c.source === '社区' ? 's-community' : 's-trade';
  const srcLabel = c.blackbox ? '黑盒' : c.source;
  const mc = (c.merchants||[]).length;
  const summary = (c.desc||'').replace(/\n/g,' ').slice(0,45) + ((c.desc||'').length>45?'…':'');
  return `<div class="card" id="card-${c.id}">
    <div class="card-header" onclick="toggleCard(${c.id})">
      <span class="source-badge ${srcCls}">${srcLabel}</span>
      <div class="card-title-group">
        <div class="violation-reason">${esc(c.reason)}</div>
        ${summary ? `<div class="violation-summary">${esc(summary)}</div>` : ''}
      </div>
      <div class="card-meta">
        <span class="merchant-badge ${mc?'has':''}">${mc ? mc+'个商家' : '暂无商家'}</span>
        ${c.blackbox ? '<span class="bb-tag">🔒 记频次</span>' : ''}
        <span class="toggle-icon">▾</span>
      </div>
    </div>
    <div class="card-body">
      ${c.blackbox ? `<div class="section"><div class="section-label">黑盒频次</div>
        <div class="blackbox-box"><div class="freq-num">${c.freq||1}</div>
        <div class="freq-label">次 · 审核未说明原因，持续跟进</div></div></div>` : ''}
      ${c.desc ? `<div class="section"><div class="section-label">违规描述</div>
        <div class="section-content">${linkify(esc(c.desc))}</div></div>` : ''}
      ${c.advice ? `<div class="section"><div class="section-label">规避建议</div>
        <div class="advice-box">${esc(c.advice)}</div></div>` : ''}
      <div class="section"><div class="section-label">关联商家</div>
        ${mc > 0
          ? `<div class="merchant-list">${(c.merchants||[]).map(m=>`<span class="merchant-chip">${esc(m)}</span>`).join('')}</div>`
          : '<span class="no-data">暂无记录</span>'}</div>
      <div class="card-footer">
        <span class="card-date">${c.createdAt || ''}</span>
        <button class="edit-btn" onclick="openEdit(${c.id});event.stopPropagation()">✏️ 编辑</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById('card-'+id);
  if (el) el.classList.toggle('open');
}
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── Modal ──
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增违规案例';
  ['f_reason','f_desc','f_advice','f_merchants','f_token'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_source').value = '社区';
  document.getElementById('f_blackbox').checked = false;
  document.getElementById('f_freq').value = 1;
  document.getElementById('f_freq_row').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f_reason').focus();
}
function openEdit(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑案例';
  document.getElementById('f_source').value = c.source;
  document.getElementById('f_reason').value = c.reason;
  document.getElementById('f_desc').value = c.desc||'';
  document.getElementById('f_advice').value = c.advice||'';
  document.getElementById('f_merchants').value = (c.merchants||[]).join('，');
  document.getElementById('f_blackbox').checked = !!c.blackbox;
  document.getElementById('f_freq').value = c.freq||1;
  document.getElementById('f_freq_row').style.display = c.blackbox ? '' : 'none';
  document.getElementById('f_token').value = '';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}
function bgClose(e) { if(e.target===document.getElementById('overlay')) closeModal(); }
function toggleBB() {
  document.getElementById('f_freq_row').style.display =
    document.getElementById('f_blackbox').checked ? '' : 'none';
}

// ── 提交（写入 GitHub）──
async function submitCase() {
  const reason = document.getElementById('f_reason').value.trim();
  const pwd    = document.getElementById('f_token').value.trim();
  if (!reason) { showToast('请填写违规原因'); return; }
  if (!pwd)    { showToast('请输入团队密码'); return; }

  // 校验密码
  const encoder = new TextEncoder();
  const hashBuf = await crypto.subtle.digest('SHA-256', encoder.encode(pwd));
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hashHex !== PWD_HASH) { showToast('❌ 密码错误'); return; }

  const token = GH_TOKEN;

  const btn = document.getElementById('submitBtn');
  const tip = document.getElementById('submitTip');
  btn.disabled = true; tip.style.display = '';

  try {
    // 1. 拉取当前文件 SHA
    const metaRes = await fetch(API_URL, {
      headers: { Authorization: 'token ' + token, 'User-Agent': 'violation-cases-app' }
    });
    if (!metaRes.ok) {
      const err = await metaRes.json();
      throw new Error(err.message || 'Token 无效或无权限');
    }
    const meta = await metaRes.json();
    fileSha = meta.sha;
    let currentData = JSON.parse(atob(meta.content.replace(/\n/g,'')));

    const merchants = document.getElementById('f_merchants').value.trim();
    const isBlackbox = document.getElementById('f_blackbox').checked;

    if (editingId) {
      // 编辑
      const idx = currentData.findIndex(x=>x.id===editingId);
      if (idx !== -1) {
        currentData[idx] = {
          ...currentData[idx],
          source: document.getElementById('f_source').value,
          reason,
          desc: document.getElementById('f_desc').value.trim(),
          advice: document.getElementById('f_advice').value.trim(),
          merchants: merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [],
          blackbox: isBlackbox,
          freq: isBlackbox ? (parseInt(document.getElementById('f_freq').value)||1) : null,
          updatedAt: new Date().toISOString().slice(0,10)
        };
      }
    } else {
      // 新增
      const newCase = {
        id: Date.now(),
        source: document.getElementById('f_source').value,
        reason,
        desc: document.getElementById('f_desc').value.trim(),
        advice: document.getElementById('f_advice').value.trim(),
        merchants: merchants ? merchants.split(/[,，]+/).map(s=>s.trim()).filter(Boolean) : [],
        blackbox: isBlackbox,
        freq: isBlackbox ? (parseInt(document.getElementById('f_freq').value)||1) : null,
        createdAt: new Date().toISOString().slice(0,10)
      };
      currentData.unshift(newCase);
    }

    // 2. 推送更新
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
    const pushRes = await fetch(API_URL, {
      method: 'PUT',
      headers: {
        Authorization: 'token ' + token,
        'Content-Type': 'application/json',
        'User-Agent': 'violation-cases-app'
      },
      body: JSON.stringify({
        message: editingId ? `update: 编辑案例 ${reason}` : `add: 新增案例 ${reason}`,
        content: newContent,
        sha: fileSha
      })
    });
    if (!pushRes.ok) {
      const err = await pushRes.json();
      throw new Error(err.message || '推送失败');
    }

    cases = currentData;
    renderCards();
    closeModal();
    showToast(editingId ? '✅ 案例已更新' : '✅ 案例已保存，所有人刷新后可见');
  } catch(e) {
    showToast('❌ ' + e.message);
  } finally {
    btn.disabled = false; tip.style.display = 'none';
  }
}

// ── 工具 ──
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── Init ──
loadCases();
</script>
